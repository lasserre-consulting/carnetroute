version: '3.9'

services:
  # ─── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PORT: 8080
      APP_ENV: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/carnetroute
      DATABASE_USER: carnetroute
      DATABASE_PASSWORD: carnetroute_dev
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks: [carnetroute]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4202:8080"
    depends_on:
      - backend
    networks: [carnetroute]
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:17.9-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: carnetroute
      POSTGRES_USER: carnetroute
      POSTGRES_PASSWORD: carnetroute_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [carnetroute]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carnetroute -d carnetroute"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    ports:
      - "127.0.0.1:16379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks: [carnetroute]
    restart: unless-stopped

  # ─── NATS JetStream ───────────────────────────────────────
  nats:
    image: nats:2.12.7-alpine
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"  # monitoring
    command:
      - "--js"             # JetStream activé
      - "--http_port=8222" # HTTP monitoring
      - "--name=carnetroute-nats"
    networks: [carnetroute]
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.11.2
    ports:
      - "127.0.0.1:8091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks: [carnetroute]
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.4.3
    ports:
      - "127.0.0.1:8092:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks: [carnetroute]
    restart: unless-stopped

  # ─── Loki (logs) ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.1
    ports:
      - "127.0.0.1:8093:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks: [carnetroute]
    restart: unless-stopped

networks:
  carnetroute:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
