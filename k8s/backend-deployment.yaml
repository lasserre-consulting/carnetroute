apiVersion: apps/v1
kind: Deployment
metadata:
  name: carnetroute-backend
  namespace: carnetroute
  labels:
    app: carnetroute-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carnetroute-backend
  template:
    metadata:
      labels:
        app: carnetroute-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/carnetroute-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carnetroute-config
            - secretRef:
                name: carnetroute-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: carnetroute
spec:
  selector:
    app: carnetroute-backend
  ports:
    - port: 8080
      targetPort: 8080
