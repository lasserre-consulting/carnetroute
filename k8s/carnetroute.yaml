---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: carnetroute
  labels:
    app: carnetroute

---
# Zookeeper Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: carnetroute
  labels:
    app: carnetroute
    component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carnetroute
      component: zookeeper
  template:
    metadata:
      labels:
        app: carnetroute
        component: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.7.8
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 30

---
# Zookeeper Service
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: carnetroute
spec:
  selector:
    app: carnetroute
    component: zookeeper
  ports:
    - port: 2181
      targetPort: 2181

---
# Kafka StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: carnetroute
  labels:
    app: carnetroute
    component: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: carnetroute
      component: kafka
  template:
    metadata:
      labels:
        app: carnetroute
        component: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.8
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 29092
              name: internal
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-headless:29092,EXTERNAL://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "24"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# Kafka Headless Service (for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: carnetroute
spec:
  clusterIP: None
  selector:
    app: carnetroute
    component: kafka
  ports:
    - port: 29092
      name: internal
      targetPort: 29092

---
# Kafka Client Service
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: carnetroute
spec:
  selector:
    app: carnetroute
    component: kafka
  ports:
    - port: 9092
      targetPort: 9092
      name: client

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carnetroute-backend
  namespace: carnetroute
  labels:
    app: carnetroute
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carnetroute
      component: backend
  template:
    metadata:
      labels:
        app: carnetroute
        component: backend
    spec:
      containers:
        - name: backend
          image: carnetroute-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: carnetroute
spec:
  selector:
    app: carnetroute
    component: backend
  ports:
    - port: 8080
      targetPort: 8080

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carnetroute-frontend
  namespace: carnetroute
  labels:
    app: carnetroute
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carnetroute
      component: frontend
  template:
    metadata:
      labels:
        app: carnetroute
        component: frontend
    spec:
      containers:
        - name: frontend
          image: carnetroute-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: carnetroute
spec:
  selector:
    app: carnetroute
    component: frontend
  ports:
    - port: 80
      targetPort: 80

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carnetroute
  namespace: carnetroute
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "frontend"
spec:
  ingressClassName: nginx
  rules:
    - host: carnetroute.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
