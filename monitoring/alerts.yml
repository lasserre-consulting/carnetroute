groups:
  - name: carnetroute
    interval: 30s
    rules:
      - alert: HighSimulationLatency
        expr: histogram_quantile(0.95, rate(simulation_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence simulation p95 > 500ms"
          description: "La latence de simulation est élevée depuis 5 minutes"

      - alert: HighErrorRate
        expr: rate(ktor_http_server_requests_total{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs HTTP 5xx élevé"

      - alert: DatabaseConnectionsHigh
        expr: hikaricp_connections_active > 8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pool de connexions DB presque saturé"

      - alert: BackendDown
        expr: up{job="carnetroute-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend Carnet Route inaccessible"
