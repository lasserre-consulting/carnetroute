# Global
environment: production
image:
  registry: ghcr.io
  repository: ""  # Set to your GitHub username/repo
  pullPolicy: IfNotPresent

# Backend
backend:
  image:
    name: carnetroute-backend
    tag: latest
  replicaCount: 2
  port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    APP_ENV: production
    PORT: "8080"

# Frontend
frontend:
  image:
    name: carnetroute-frontend
    tag: latest
  replicaCount: 2
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# PostgreSQL
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: carnetroute
  user: carnetroute
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"

# Redis
redis:
  enabled: true
  image: redis:7-alpine
  persistence:
    enabled: true
    size: 5Gi

# NATS
nats:
  enabled: true
  image: nats:2.10-alpine

# Ingress
ingress:
  enabled: true
  className: nginx
  host: carnetroute.fr
  tls:
    enabled: true
    issuer: letsencrypt-prod

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Secrets (override in production)
secrets:
  jwtSecret: "CHANGE_ME_IN_PRODUCTION"
  databasePassword: "CHANGE_ME_IN_PRODUCTION"
