{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "carnetroute.fullname" . }}-postgres
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "carnetroute.fullname" . }}-postgres-service
  replicas: 1
  selector:
    matchLabels:
      {{- include "carnetroute.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "carnetroute.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "carnetroute.fullname" . }}-secrets
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "carnetroute.fullname" . }}-secrets
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
  {{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
  {{- else }}
  # Persistence disabled — using emptyDir for dev/staging
  # volumes are injected at pod level via spec.template.spec.volumes
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "carnetroute.fullname" . }}-postgres-service
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  clusterIP: None
  selector:
    {{- include "carnetroute.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  ports:
    - port: 5432
{{- end }}
