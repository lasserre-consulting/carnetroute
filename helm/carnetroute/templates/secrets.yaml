apiVersion: v1
kind: Secret
metadata:
  name: {{ include "carnetroute.fullname" . }}-secrets
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_USER: {{ .Values.postgresql.user | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  REDIS_PASSWORD: ""
