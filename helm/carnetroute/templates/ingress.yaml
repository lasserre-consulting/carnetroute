{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "carnetroute.fullname" . }}-ingress
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.tls.enabled | quote }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "carnetroute.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "carnetroute.fullname" . }}-backend-service
                port:
                  number: {{ .Values.backend.port }}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "carnetroute.fullname" . }}-backend-service
                port:
                  number: {{ .Values.backend.port }}
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: {{ include "carnetroute.fullname" . }}-backend-service
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "carnetroute.fullname" . }}-frontend-service
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
