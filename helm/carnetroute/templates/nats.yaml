{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "carnetroute.fullname" . }}-nats
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "carnetroute.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "carnetroute.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          args: ["--js", "--http_port=8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitoring
              containerPort: 8222
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "carnetroute.fullname" . }}-nats-service
  namespace: {{ include "carnetroute.namespace" . }}
  labels:
    {{- include "carnetroute.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  selector:
    {{- include "carnetroute.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: 4222
    - name: monitoring
      port: 8222
{{- end }}
