version: '3.9'
services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/carnetroute-backend:${IMAGE_TAG:-latest}
    environment:
      APP_ENV: production
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/carnetroute-frontend:${IMAGE_TAG:-latest}
    deploy:
      replicas: 2

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
